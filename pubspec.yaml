name: flight_booking_app
description: "A Flutter flight booking application with search, results, and boarding pass features."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.1
  dio_cache_interceptor: ^3.5.0
  dio_cache_interceptor_hive_store: ^3.2.2
  connectivity_plus: ^5.0.2

  # Navigation (with type-safe route generation)
  go_router: ^13.2.1

  # UI Components
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  intl: ^0.20.2

  # Models (immutability, copyWith, equality, JSON serialization)
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  equatable: ^2.0.7

  # Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Export & Share
  screenshot: ^3.0.0
  path_provider: ^2.1.2
  share_plus: ^9.0.0
  permission_handler: ^11.3.1
  gal: ^2.3.0

  # Utils
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  freezed: ^2.4.7
  riverpod_generator: ^2.4.0
  go_router_builder: ^2.4.1

flutter:
  uses-material-design: true